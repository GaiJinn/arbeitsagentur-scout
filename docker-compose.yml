# docker-compose.yml — two services sharing one image and one SQLite db:
#
#   scout: single-shot, scheduled by host cron.
#     docker compose run --rm scout
#     0 */4 * * *  cd /opt/arbeitsagentur-scout && /usr/bin/docker compose run --rm scout >> /var/log/scout.log 2>&1
#
#   bot: long-running, listens for "generate tailored CV" button clicks.
#     docker compose up -d bot

services:
  scout:
    build: .
    image: arbeitsagentur-scout:latest
    env_file: .env
    volumes:
      - ./data:/data
      - ./profile.md:/app/profile.md:ro
      - ./queries.json:/app/queries.json:ro
    restart: "no"

  bot:
    build: .
    image: arbeitsagentur-scout:latest
    command: python -u telegram_bot.py
    env_file: .env
    volumes:
      - ./data:/data
      - ./cv.pdf:/app/cv.pdf:ro
    restart: unless-stopped
    # bot is a long-polling loop with no HTTP endpoint of its own, so
    # liveness is checked via a heartbeat file telegram_bot.py touches once
    # per poll cycle (~every 30s). If it's silently hung or crashed inside
    # the container, `docker compose ps` / `docker inspect` will show
    # "unhealthy" instead of a falsely-green "running".
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,time,os; p='/tmp/telegram_bot_heartbeat'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<120 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
